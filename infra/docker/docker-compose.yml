services:
  db:
    image: postgres:16
    container_name: elos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elos}
      POSTGRES_DB: ${POSTGRES_DB:-elos}
    ports:
      - "5432:5432"
    volumes:
      - elos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elos} -d ${POSTGRES_DB:-elos}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  elos-pgdata:
